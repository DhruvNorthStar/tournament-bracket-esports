<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tournament Bracket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ───── SETUP SCREEN ───── -->
  <div id="setup-screen" class="screen">
    <div class="page-title">Tournament Bracket</div>

    <div class="card">
      <div class="card-heading">Tournament Name</div>
      <input type="text" id="tournament-name" placeholder="e.g. VCT Challengers 2025" maxlength="48" />
    </div>

    <div class="card">
      <div class="card-heading">Teams</div>
      <div class="row-gap">
        <input type="text" id="team-input" placeholder="Team name..." maxlength="24" />
        <button class="btn" onclick="addTeam()">Add</button>
      </div>
      <div id="teams-list" class="tags-list"></div>
      <div class="hint" id="team-hint">0 teams · minimum 4 required</div>
      <button class="btn btn-ghost mt8" onclick="loadSampleTeams()">Load sample teams (8)</button>
    </div>

    <div class="card">
      <div class="card-heading">Format</div>
      <div class="label-sm">Match format</div>
      <div class="pill-group" id="rounds-group">
        <button class="pill active" onclick="selectRounds(1,this)">Best of 1</button>
        <button class="pill" onclick="selectRounds(3,this)">Best of 3</button>
        <button class="pill" onclick="selectRounds(5,this)">Best of 5</button>
      </div>
      <div class="label-sm mt12">Bracket type</div>
      <div class="pill-group" id="type-group">
        <button class="pill active" onclick="selectType('double',this)">Double Elimination</button>
        <button class="pill" onclick="selectType('single',this)">Single Elimination</button>
      </div>
    </div>

    <div class="card">
      <div class="card-heading">Lock Password</div>
      <div class="hint mb8">Set a password. Once you start the tournament, bracket edits will require this password.</div>
      <input type="password" id="lock-password" placeholder="Enter password..." maxlength="32" />
    </div>

    <button class="btn btn-primary full-width" id="start-btn" onclick="startTournament()" disabled>
      Generate Bracket
    </button>
  </div>

  <!-- ───── BRACKET SCREEN ───── -->
  <div id="bracket-screen" class="screen" style="display:none">
    <div class="bracket-topbar">
      <div>
        <div class="page-title" id="bracket-title">Tournament</div>
        <div class="hint" id="bracket-meta"></div>
      </div>
      <div class="topbar-actions">
        <span id="lock-badge" class="badge badge-locked" style="display:none">🔒 Locked</span>
        <button class="btn btn-ghost" onclick="exportJSON()">Export</button>
        <button class="btn btn-ghost" onclick="importJSON()">Import</button>
        <button class="btn btn-ghost" onclick="resetToSetup()">New</button>
      </div>
    </div>

    <div id="bracket-content"></div>
  </div>

  <!-- ───── SCORE MODAL ───── -->
  <div id="score-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-title" id="modal-title">Enter Score</div>
      <div id="score-fields"></div>
      <div class="hint" id="modal-hint"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitScore()">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ───── PASSWORD MODAL ───── -->
  <div id="pw-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-title">Enter Password to Edit</div>
      <input type="password" id="pw-input" placeholder="Password..." style="margin-bottom:16px" />
      <div class="hint" id="pw-error" style="color:#c0392b;display:none">Incorrect password.</div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closePwModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitPassword()">Unlock</button>
      </div>
    </div>
  </div>

  <!-- ───── TOAST ───── -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
